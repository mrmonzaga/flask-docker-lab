<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flask Item Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3d;
      --accent: #7c6af7;
      --accent2: #f76a8a;
      --text: #e8e8f0;
      --muted: #6b6b85;
      --success: #4fd1a5;
      --danger: #f76a8a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
      top: -200px; right: -200px;
      pointer-events: none; z-index: 0;
      animation: orbFloat 8s ease-in-out infinite;
    }

    .glow-orb2 {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(247,106,138,0.08) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      pointer-events: none; z-index: 0;
      animation: orbFloat 10s ease-in-out infinite reverse;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(20px, 30px); }
    }

    /* ── AUTH PAGE ── */
    #authPage {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s ease both;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .badge {
      display: inline-block;
      background: rgba(124,106,247,0.15);
      border: 1px solid rgba(124,106,247,0.3);
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .auth-logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
      border: none;
      background: transparent;
    }

    .auth-tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px rgba(124,106,247,0.4);
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
    }

    .form-input::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      margin-top: 8px;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(124,106,247,0.4);
    }

    .auth-error {
      background: rgba(247,106,138,0.1);
      border: 1px solid rgba(247,106,138,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--danger);
      margin-top: 12px;
      display: none;
    }

    .auth-success {
      background: rgba(79,209,165,0.1);
      border: 1px solid rgba(79,209,165,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--success);
      margin-top: 12px;
      display: none;
    }

    /* ── MAIN APP ── */
    #appPage { display: none; }

    .container {
      position: relative; z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    header {
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease both;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle { color: var(--muted); font-size: 12px; }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 6px;
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 16px 8px 8px;
      flex-shrink: 0;
    }

    .user-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 12px; font-weight: 800; color: #fff;
    }

    .user-name { font-size: 12px; }

    .logout-btn {
      background: none; border: none;
      color: var(--muted); font-size: 11px;
      cursor: pointer; font-family: 'DM Mono', monospace;
      transition: color 0.2s;
    }

    .logout-btn:hover { color: var(--danger); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      animation: fadeUp 0.6s ease both;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: rgba(124,106,247,0.25); }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.2s; }

    .card-header {
      display: flex; align-items: center;
      gap: 10px; margin-bottom: 20px;
    }

    .card-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }

    .card-icon.purple { background: rgba(124,106,247,0.15); }
    .card-icon.green { background: rgba(79,209,165,0.15); }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    .input-row { display: flex; gap: 10px; }

    input[type="text"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    .add-btn {
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      padding: 12px 20px;
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }

    .add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(124,106,247,0.4);
    }

    .refresh-btn {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 6px 14px; margin-left: auto;
      font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 600;
      cursor: pointer; transition: border-color 0.2s;
    }

    .refresh-btn:hover { border-color: var(--accent); }

    .items-list { display: flex; flex-direction: column; gap: 8px; }

    .item {
      display: flex; align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      animation: fadeUp 0.3s ease both;
      transition: border-color 0.2s;
    }

    .item:hover { border-color: rgba(124,106,247,0.2); }
    .item-name { font-size: 13px; }
    .item-id { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .del-btn {
      background: transparent; color: var(--danger);
      border: 1px solid rgba(247,106,138,0.3);
      border-radius: 6px; padding: 5px 10px;
      font-size: 10px; font-family: 'Syne', sans-serif;
      font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }

    .del-btn:hover { background: rgba(247,106,138,0.1); }

    .empty-state {
      text-align: center; padding: 36px;
      color: var(--muted); font-size: 12px;
    }

    .empty-state .emoji { font-size: 28px; display: block; margin-bottom: 10px; }

    .stats-row { display: flex; gap: 12px; margin-top: 16px; }

    .stat {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; text-align: center;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 22px; font-weight: 800; color: var(--accent);
    }

    .stat-label {
      font-size: 10px; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px;
    }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 18px; font-size: 13px;
      z-index: 100; transform: translateY(80px); opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(79,209,165,0.4); }
    .toast.error { border-color: rgba(247,106,138,0.4); }

    .loader {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="glow-orb"></div>
<div class="glow-orb2"></div>

<!-- AUTH PAGE -->
<div id="authPage">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="badge">Flask + MongoDB</div>
      <h1>Item Manager</h1>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <div id="loginForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="loginUsername" placeholder="Enter your username"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password"/>
      </div>
      <button class="btn-primary" onclick="handleLogin()" id="loginBtn">Login</button>
      <div class="auth-error" id="loginError"></div>
    </div>

    <!-- Register -->
    <div id="registerForm" style="display:none;">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="regUsername" placeholder="Choose a username"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="regPassword" placeholder="Choose a password"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-input" id="regConfirm" placeholder="Repeat your password"/>
      </div>
      <button class="btn-primary" onclick="handleRegister()" id="registerBtn">Create Account</button>
      <div class="auth-error" id="registerError"></div>
      <div class="auth-success" id="registerSuccess"></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appPage">
  <div class="container">
    <header>
      <div>
        <div class="badge">Flask + MongoDB + Docker</div>
        <h1>Item Manager</h1>
        <p class="subtitle"><span class="status-dot"></span>Connected to localhost</p>
      </div>
      <div class="user-pill">
        <div class="user-avatar" id="userAvatar">?</div>
        <span class="user-name" id="userName">User</span>
        <button class="logout-btn" onclick="logout()">logout</button>
      </div>
    </header>

    <div class="card">
      <div class="card-header">
        <div class="card-icon purple">＋</div>
        <span class="card-title">Add Item</span>
      </div>
      <div class="input-row">
        <input type="text" id="itemInput" placeholder="Enter item name..."/>
        <button class="add-btn" onclick="addItem()" id="addBtn">Add</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-icon green">◈</div>
        <span class="card-title">All Items</span>
        <button class="refresh-btn" onclick="loadItems()">↻ Refresh</button>
      </div>
      <div id="itemsList" class="items-list">
        <div class="empty-state"><span class="emoji">📦</span>Loading...</div>
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-value" id="totalCount">0</div>
          <div class="stat-label">Total Items</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="apiStatus" style="color:var(--success)">200</div>
          <div class="stat-label">API Status</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost';

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
    });
    document.getElementById('loginForm').style.display = tab==='login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab==='register' ? 'block' : 'none';
  }

  async function handleRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    const btn = document.getElementById('registerBtn');

    document.getElementById('registerError').style.display = 'none';
    document.getElementById('registerSuccess').style.display = 'none';

    if (!username || !password) { showAuthError('registerError', 'Please fill in all fields'); return; }
    if (password !== confirm) { showAuthError('registerError', 'Passwords do not match'); return; }
    if (password.length < 6) { showAuthError('registerError', 'Password must be at least 6 characters'); return; }

    btn.innerHTML = '<span class="loader"></span>';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { showAuthError('registerError', data.error || 'Registration failed'); return; }
      const s = document.getElementById('registerSuccess');
      s.textContent = '✓ Account created! Redirecting to login...';
      s.style.display = 'block';
      setTimeout(() => switchTab('login'), 1500);
    } catch {
      showAuthError('registerError', 'Cannot connect. Is Docker running?');
    } finally {
      btn.innerHTML = 'Create Account';
      btn.disabled = false;
    }
  }

  async function handleLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');

    document.getElementById('loginError').style.display = 'none';
    if (!username || !password) { showAuthError('loginError', 'Please fill in all fields'); return; }

    btn.innerHTML = '<span class="loader"></span>';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { showAuthError('loginError', data.error || 'Login failed'); return; }

      document.getElementById('userName').textContent = username;
      document.getElementById('userAvatar').textContent = username[0].toUpperCase();
      document.getElementById('authPage').style.display = 'none';
      document.getElementById('appPage').style.display = 'block';
      loadItems();
      showToast(`Welcome, ${username}!`);
    } catch {
      showAuthError('loginError', 'Cannot connect. Is Docker running?');
    } finally {
      btn.innerHTML = 'Login';
      btn.disabled = false;
    }
  }

  function logout() {
    document.getElementById('appPage').style.display = 'none';
    document.getElementById('authPage').style.display = 'flex';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    switchTab('login');
  }

  async function loadItems() {
    try {
      const res = await fetch(`${API}/items`);
      const data = await res.json();
      document.getElementById('totalCount').textContent = data.length || 0;
      document.getElementById('apiStatus').textContent = '200';
      document.getElementById('apiStatus').style.color = 'var(--success)';
      const list = document.getElementById('itemsList');
      if (!data.length) {
        list.innerHTML = `<div class="empty-state"><span class="emoji">🗃️</span>No items yet. Add one above!</div>`;
        return;
      }
      list.innerHTML = data.map(item => `
        <div class="item">
          <div>
            <div class="item-name">${item.name}</div>
            <div class="item-id">${item._id}</div>
          </div>
          <button class="del-btn" onclick="deleteItem('${item._id}')">Delete</button>
        </div>
      `).join('');
    } catch {
      document.getElementById('apiStatus').textContent = 'ERR';
      document.getElementById('apiStatus').style.color = 'var(--danger)';
      document.getElementById('itemsList').innerHTML = `<div class="empty-state"><span class="emoji">⚠️</span>Cannot connect to API.</div>`;
    }
  }

  async function addItem() {
    const input = document.getElementById('itemInput');
    const btn = document.getElementById('addBtn');
    const name = input.value.trim();
    if (!name) { showToast('Please enter a name', 'error'); return; }
    btn.innerHTML = '<span class="loader"></span>';
    btn.disabled = true;
    try {
      await fetch(`${API}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      input.value = '';
      showToast(`"${name}" added!`);
      loadItems();
    } catch { showToast('Failed to add item', 'error'); }
    finally { btn.innerHTML = 'Add'; btn.disabled = false; }
  }

  async function deleteItem(id) {
    try {
      await fetch(`${API}/items/${id}`, { method: 'DELETE' });
      showToast('Item deleted');
      loadItems();
    } catch { showToast('Failed to delete', 'error'); }
  }

  function showAuthError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = '✗ ' + msg;
    el.style.display = 'block';
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = (type==='success' ? '✓ ' : '✗ ') + msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('appPage').style.display !== 'none') addItem();
  });
</script>
</body>
</html>
